<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@700;800&display=swap" rel="stylesheet" />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      background-color: #090A14;
      color: #E2E4EC;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── Card ── */
    .login-card {
      background: #0E101F;
      border: 1px solid rgba(223, 107, 51, 0.12);
      border-radius: 28px;
      width: 100%;
      max-width: 460px;
      padding: 44px 36px 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      transition: box-shadow 0.25s;
    }
    .login-card:hover {
      box-shadow: 0 24px 72px rgba(223, 107, 51, 0.07);
    }

    /* ── Heading ── */
    .login-heading {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 30px;
      line-height: 1.2;
      color: #F0F2F8;
      margin-bottom: 4px;
    }
    .login-sub {
      font-size: 15px;
      color: #7E8299;
      margin-bottom: 32px;
    }

    /* ── Fields ── */
    .input-group {
      position: relative;
      margin-bottom: 20px;
    }
    .input-group .icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #5A5E78;
      pointer-events: none;
      transition: color 0.2s;
    }
    .input-group input {
      width: 100%;
      padding: 14px 16px 14px 46px;
      background: #141729;
      border: 1.5px solid #262A40;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      color: #E2E4EC;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-group input::placeholder { color: #5A5E78; }
    .input-group input:focus {
      border-color: #DF6B33;
      box-shadow: 0 0 0 3px rgba(223, 107, 51, 0.15);
    }
    .input-group input:focus + .icon,
    .input-group input:focus ~ .icon { color: #DF6B33; }

    /* ── Field error ── */
    .field-error {
      font-size: 13px;
      color: #EF4444;
      max-height: 0;
      opacity: 0;
      margin-top: 0;
      padding: 0 4px;
      transition: max-height 0.2s ease, opacity 0.2s ease, margin-top 0.2s ease, padding 0.2s ease;
      overflow: hidden;
      pointer-events: none;
    }
    .field-error.visible {
      max-height: 32px;
      opacity: 1;
      margin-top: 6px;
      padding: 0 4px;
    }
    .input-group.has-error input {
      border-color: #EF4444;
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.12);
    }
    .input-group.has-error .icon { color: #EF4444; }

    /* ── Password toggle ── */
    .toggle-pw {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #5A5E78;
      cursor: pointer;
      padding: 4px;
      display: flex;
      transition: color 0.2s;
    }
    .toggle-pw:hover { color: #DF6B33; }

    /* ── Row: Remember + Forgot ── */
    .row-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      font-size: 14px;
      gap: 12px;
      flex-wrap: wrap;
    }
    .checkbox-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: #A0A4B8;
      user-select: none;
    }
    .checkbox-wrap input[type="checkbox"] {
      appearance: none;
      width: 18px;
      height: 18px;
      border: 1.5px solid #3D4160;
      border-radius: 5px;
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .checkbox-wrap input[type="checkbox"]:checked {
      background: #DF6B33;
      border-color: #DF6B33;
    }
    .checkbox-wrap input[type="checkbox"]:checked::after {
      content: "✓";
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
    }
    .forgot-link {
      color: #A0A4B8;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .forgot-link:hover { color: #DF6B33; }

    /* ── CTA ── */
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: #DF6B33;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn-primary:hover {
      background: #c95c2a;
      box-shadow: 0 6px 24px rgba(223, 107, 51, 0.3);
    }
    .btn-primary:active { transform: scale(0.98); }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 28px 0;
      color: #3D4160;
      font-size: 13px;
    }
    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #262A40;
    }

    /* ── Social buttons ── */
    .social-grid {
      display: flex;
      gap: 12px;
    }
    .social-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 0;
      background: #141729;
      border: 1.5px solid #262A40;
      border-radius: 12px;
      color: #C8CBD8;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }
    .social-btn:hover {
      background: #1C1F33;
      border-color: #DF6B33;
      color: #fff;
    }
    .social-btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }
    .social-btn--github svg { color: #E2E4EC; }
    .social-btn--facebook svg { color: #1877F2; }

    /* ── Footer ── */
    .footer-text {
      text-align: center;
      margin-top: 32px;
      font-size: 14px;
      color: #7E8299;
    }
    .footer-text a {
      color: #DF6B33;
      text-decoration: none;
      font-weight: 500;
    }
    .footer-text a:hover { text-decoration: underline; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .login-card { padding: 32px 22px 28px; border-radius: 22px; }
      .login-heading { font-size: 26px; }
      .social-grid { flex-direction: column; }
    }
  </style>
</head>

<body>

  <div class="login-card">

    <!-- Heading -->
    <h1 class="login-heading">Welcome back</h1>
    <p class="login-sub">Sign in to your account to continue</p>

    <!-- Form -->
    <form id="loginForm" onsubmit="return false;">

      <!-- Email -->
      <div class="input-group" data-field="email">
        <input type="email" id="email" placeholder="Email address" autocomplete="email" />
        <i class="icon" data-lucide="mail" width="20" height="20"></i>
        <p class="field-error" id="emailError"></p>
      </div>

      <!-- Password -->
      <div class="input-group" data-field="password">
        <input type="password" id="password" placeholder="Password" autocomplete="current-password" />
        <i class="icon" data-lucide="lock" width="20" height="20"></i>
        <button type="button" class="toggle-pw" id="togglePassword" aria-label="Toggle password visibility">
          <i data-lucide="eye" width="20" height="20"></i>
        </button>
        <p class="field-error" id="passwordError"></p>
      </div>

      <!-- Remember & Forgot -->
      <div class="row-meta">
        <label class="checkbox-wrap">
          <input type="checkbox" checked />
          Remember me
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-primary">Sign In</button>

    </form>

    <!-- Divider -->
    <div class="divider">or continue with</div>

    <!-- Social -->
    <div class="social-grid">
      <button class="social-btn social-btn--google" aria-label="Sign in with Google">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Google
      </button>
      <button class="social-btn social-btn--github" aria-label="Sign in with GitHub">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844a9.59 9.59 0 012.504.338c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
        </svg>
        GitHub
      </button>
      <button class="social-btn social-btn--facebook" aria-label="Sign in with Facebook">
        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M24 12.073c0-6.627-5.373-12-12-12S0 5.446 0 12.073c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073Z"/>
        </svg>
        Facebook
      </button>
    </div>

    <!-- Footer -->
    <p class="footer-text">
      Don't have an account? <a href="register.html">Sign up</a>
    </p>

  </div>

  <!-- Replace Lucide icons -->
  <script>
    lucide.createIcons();

    // ── Password toggle ──
    document.getElementById("togglePassword").addEventListener("click", function () {
      const pw = document.getElementById("password");
      const icon = this.querySelector("i");
      const isPassword = pw.type === "password";
      pw.type = isPassword ? "text" : "password";
      icon.setAttribute("data-lucide", isPassword ? "eye-off" : "eye");
      lucide.createIcons();
    });

    // ── Validation helpers ──
    const email    = document.getElementById("email");
    const password = document.getElementById("password");
    const emailErr = document.getElementById("emailError");
    const pwErr    = document.getElementById("passwordError");
    const emailGrp = email.closest(".input-group");
    const pwGrp    = password.closest(".input-group");

    function isValidEmail(v) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
    }

    function setError(group, errorEl, message) {
      if (message) {
        errorEl.textContent = message;
        errorEl.classList.add("visible");
        group.classList.add("has-error");
      } else {
        errorEl.textContent = "";
        errorEl.classList.remove("visible");
        group.classList.remove("has-error");
      }
    }

    function validateEmail() {
      const v = email.value.trim();
      if (!v) return setError(emailGrp, emailErr, "Email is required.");
      if (!isValidEmail(v)) return setError(emailGrp, emailErr, "Please enter a valid email address.");
      setError(emailGrp, emailErr, null);
      return true;
    }

    function validatePassword() {
      const v = password.value.trim();
      if (!v) return setError(pwGrp, pwErr, "Password is required.");
      setError(pwGrp, pwErr, null);
      return true;
    }

    // ── Real-time validation on blur ──
    email.addEventListener("blur", validateEmail);
    password.addEventListener("blur", validatePassword);

    // ── Clear errors on focus ──
    email.addEventListener("focus", () => setError(emailGrp, emailErr, null));
    password.addEventListener("focus", () => setError(pwGrp, pwErr, null));

    // ── Demo submit ──
    document.getElementById("loginForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const okEmail = validateEmail();
      const okPw    = validatePassword();
      if (!okEmail || !okPw) return;
      alert(`Demo sign-in — welcome back, ${email.value.trim()}!`);
    });
  </script>

</body>
</html>
